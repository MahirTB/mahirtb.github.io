<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor — Mahir Tajwar Bhuiyan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css?v=30">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="images/mtb_logo_trimmed.png">
</head>

<body>
    <div class="container">
        <header>
            <div>
                <h1 style="font-size: 1.5rem;">Editor</h1>
                <p>Create new content</p>
            </div>
            <nav>
                <a href="./">Home</a>
                <a href="projects">Projects</a>
                <a href="blogs">Blogs</a>
            </nav>
        </header>

        <main style="padding-top: 48px;">
            <div id="editor-form-container">

                <div class="input-group">
                    <label for="type">Content Type</label>
                    <select id="type">
                        <option value="blog">Blog Post</option>
                        <option value="project">Project</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" placeholder="Enter title...">
                </div>

                <div class="input-group">
                    <label for="summary">Summary</label>
                    <input type="text" id="summary" placeholder="One sentence summary...">
                </div>

                <label>Content</label>
                <div class="toolbar">
                    <button onclick="document.execCommand('bold',false,null)"><i class="fas fa-bold"></i></button>
                    <button onclick="document.execCommand('italic',false,null)"><i class="fas fa-italic"></i></button>
                    <button onclick="document.execCommand('formatBlock',false,'<h3>')">H3</button>
                    <button onclick="document.execCommand('justifyLeft',false,null)"><i
                            class="fas fa-align-left"></i></button>
                    <button onclick="document.execCommand('justifyCenter',false,null)"><i
                            class="fas fa-align-center"></i></button>
                    <button onclick="document.execCommand('justifyRight',false,null)"><i
                            class="fas fa-align-right"></i></button>
                    <button onclick="document.execCommand('justifyFull',false,null)"><i
                            class="fas fa-align-justify"></i></button>
                    <button onclick="document.execCommand('createLink',false,prompt('Enter URL:'))"><i
                            class="fas fa-link"></i></button>
                    <button onclick="document.getElementById('imageInput').click()"><i
                            class="fas fa-image"></i></button>
                </div>
                <input type="file" id="imageInput" accept="image/*" style="display: none;">
                <div id="editor" class="editor-container" contenteditable="true">
                    <p>Start writing here...</p>
                </div>

                <div style="margin-top: 20px;">
                    <button id="saveBtn" class="btn">Save Content</button>
                    <span id="status"
                        style="margin-left: 14px; font-family: var(--font-mono); font-size: 0.72rem; color: var(--accent);"></span>
                </div>
            </div>
        </main>
    </div>

    <script src="scripts/editor.js?v=3"></script>
</body>

</html>
